name: codeql

on:
  schedule:
    - cron: '0 4 * * 1'
  push:
    branches: [main]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with: { languages: go }
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
