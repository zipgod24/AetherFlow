name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::the following files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: build
        run: |
          for d in api-gateway orchestrator retriever-agent reasoner-agent validator-agent executor-agent aetherctl; do
            go build -trimpath ./cmd/$d
          done
      - name: test
        run: go test -race -count=1 ./...

  docker:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - name: smoke-build images
        run: |
          for d in api-gateway orchestrator retriever-agent reasoner-agent validator-agent executor-agent; do
            docker build --build-arg BIN=$d -t aetherflow/$d:ci .
          done
